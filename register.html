<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Norkys</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">
      
      <div class="auth-img-side" style="background-image: url('https://images.unsplash.com/photo-1610057099443-fde8c4d50f91');">
        <div class="auth-img-text">
          <h2>Únete a la familia.</h2>
          <p>Crea tu cuenta hoy y obtén delivery gratis en tu primer pedido mayor a S/40.</p>
        </div>
      </div>

      <div class="auth-form-side">
        <div class="logo-header" onclick="window.location='index.html'">
          <img src="imgs/logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3388/3388655.png'">
          <h1>NORKYS</h1>
        </div>

        <h2>Crear Cuenta 🚀</h2>
        <p class="subtitle">Completa tus datos y empieza a disfrutar.</p>

        <div class="input-group">
          <input id="rname" type="text" placeholder="Nombre completo">
          <span class="error-msg" id="err-rname"></span>
        </div>

        <div class="input-group">
          <input id="ruser" type="email" placeholder="Correo electrónico">
          <span class="error-msg" id="err-ruser"></span>
        </div>
        
        <div class="input-group">
          <input id="rpass" type="password" placeholder="Crea una contraseña (Mín. 6 letras)">
          <span class="error-msg" id="err-rpass"></span>
        </div>

        <button class="btn-auth" onclick="register()" style="margin-top: 10px;">Completar Registro</button>

        <div class="auth-footer">
          <p>¿Ya eres parte de la familia? <a href="login.html">Inicia sesión</a></p>
        </div>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/auth.js"></script>
</body>
</html>
